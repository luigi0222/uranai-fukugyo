services:
  - type: web
    name: uranai-fukugyo
    runtime: python
    buildCommand: pip install -r web/requirements_web.txt
    startCommand: gunicorn --chdir web app:app --bind 0.0.0.0:10000
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_PUBLIC_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: PORT
        value: "10000"
