<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>タロット恋愛鑑定｜神楽</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Zen+Antique&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --gold: #C9A84C; --gold-light: #FFE08A; --gold-dark: #8B6914;
      --ink: #030308; --ivory: #EDE0C4; --ivory-dim: rgba(237,224,196,0.55);
      --border: rgba(201,168,76,0.22);
      --gold-grad: linear-gradient(135deg,#8B6914,#C9A84C,#FFE08A,#C9A84C,#8B6914);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{font-family:'Noto Serif JP',serif;background:var(--ink);color:var(--ivory);min-height:100vh;overflow-x:hidden;}

    /* Stars */
    #sf{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
    .st{position:absolute;border-radius:50%;background:#fff;animation:tw var(--d,3s) var(--dl,0s) infinite ease-in-out;}
    @keyframes tw{0%,100%{opacity:.1;transform:scale(.7);}50%{opacity:.8;transform:scale(1.3);}}
    .nb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;}

    /* Loading */
    #loading{position:fixed;inset:0;background:#000;z-index:1000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:28px;}
    #loading.on{display:flex;animation:fdin .5s ease;}
    @keyframes fdin{from{opacity:0;}to{opacity:1;}}
    .fs{position:absolute;width:2px;border-radius:1px;background:linear-gradient(to bottom,transparent,var(--gold),transparent);animation:fall var(--fd,3s) var(--fdl,0s) linear infinite;opacity:0;}
    @keyframes fall{0%{transform:translateY(-40px);opacity:0;}10%{opacity:1;}90%{opacity:.6;}100%{transform:translateY(110vh);opacity:0;}}
    .orb{width:90px;height:90px;border-radius:50%;border:1px solid rgba(201,168,76,.4);animation:spin 3s linear infinite;display:flex;align-items:center;justify-content:center;}
    .orb::before{content:'';position:absolute;width:62px;height:62px;border-radius:50%;border:1px solid rgba(201,168,76,.22);animation:spin 2s linear infinite reverse;}
    .orb::after{content:'🔮';font-size:1.5rem;}
    @keyframes spin{to{transform:rotate(360deg);}}
    @keyframes shim{0%{background-position:0% center;}100%{background-position:200% center;}}

    /* Content */
    .wrap{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 18px 80px;}
    @keyframes rise{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

    /* Header */
    .hdr{text-align:center;padding:44px 0 32px;}
    .sub-lbl{font-size:.68rem;letter-spacing:.3em;color:var(--gold);opacity:.7;margin-bottom:8px;}
    .title{font-family:'Zen Antique',serif;font-size:1.7rem;background:var(--gold-grad);background-size:200%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:shim 4s linear infinite;letter-spacing:.3em;}

    /* Steps indicator */
    .steps{display:flex;justify-content:center;gap:6px;margin-bottom:28px;}
    .step-dot{width:28px;height:4px;border-radius:2px;background:rgba(201,168,76,.2);transition:background .3s;}
    .step-dot.active{background:var(--gold);}

    /* Section */
    .section{display:none;animation:rise .5s ease;}
    .section.visible{display:block;}
    .sec-title{font-size:.72rem;letter-spacing:.22em;color:var(--gold);text-align:center;margin-bottom:20px;text-transform:uppercase;}

    /* Problem buttons */
    .prob-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px;}
    .prob-btn{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:14px;padding:18px 10px;text-align:center;cursor:pointer;transition:all .2s;font-family:'Noto Serif JP',serif;color:var(--ivory-dim);font-size:.85rem;line-height:1.6;}
    .prob-btn .emoji{font-size:1.4rem;display:block;margin-bottom:6px;}
    .prob-btn.sel,.prob-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.07);}

    /* Card grid */
    .card-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
    .card-item{aspect-ratio:2/3;border-radius:8px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all .2s;position:relative;}
    .card-item img{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(.85);}
    .card-item:hover img{filter:brightness(1);}
    .card-item.sel{border-color:var(--gold);box-shadow:0 0 16px rgba(201,168,76,.4);}
    .card-item .card-name{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(3,3,8,.95),transparent);padding:6px 4px 4px;font-size:.52rem;text-align:center;color:var(--gold);letter-spacing:.05em;}

    /* Orient toggle */
    .orient-row{display:flex;gap:10px;margin-bottom:6px;}
    .orient-btn{flex:1;border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;cursor:pointer;font-family:'Noto Serif JP',serif;color:var(--ivory-dim);font-size:.85rem;transition:all .2s;}
    .orient-btn.sel{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.07);}

    /* Email / CTA */
    .field-input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;color:var(--ivory);padding:13px 16px;font-family:'Noto Serif JP',serif;font-size:.95rem;outline:none;transition:border-color .2s;-webkit-appearance:none;}
    .field-input:focus{border-color:var(--gold);}
    .field-input::placeholder{color:rgba(237,224,196,.2);}
    .cta{width:100%;padding:17px;border:none;border-radius:12px;font-family:'Noto Serif JP',serif;font-size:1rem;letter-spacing:.12em;color:#0C0A00;cursor:pointer;background:var(--gold-grad);background-size:200%;animation:shim 3s linear infinite;transition:transform .1s,opacity .15s;margin-top:6px;font-weight:500;}
    .cta:disabled{opacity:.5;cursor:not-allowed;}
    .cta:not(:disabled):active{transform:scale(.98);}
    .note{text-align:center;font-size:.68rem;color:rgba(237,224,196,.25);margin-top:10px;line-height:1.9;}

    /* Nav button */
    .nav-btn{display:block;width:100%;padding:14px;border:1px solid var(--border);border-radius:12px;font-family:'Noto Serif JP',serif;font-size:.9rem;color:var(--gold);cursor:pointer;background:transparent;transition:all .2s;margin-top:14px;letter-spacing:.08em;}
    .nav-btn:hover{background:rgba(201,168,76,.06);}

    /* Selected card preview */
    .card-preview{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:20px;}
    .card-preview img{width:52px;aspect-ratio:2/3;border-radius:6px;object-fit:cover;}
    .card-preview-info{flex:1;}
    .card-preview-name{font-size:.95rem;color:var(--gold);margin-bottom:4px;}
    .card-preview-en{font-size:.7rem;color:var(--ivory-dim);letter-spacing:.08em;}
  </style>
</head>
<body>
<div id="sf"></div>
<div class="nb" style="width:380px;height:380px;top:-80px;right:-80px;background:radial-gradient(circle,rgba(60,10,100,.3),transparent)"></div>
<div class="nb" style="width:280px;height:280px;bottom:150px;left:-60px;background:radial-gradient(circle,rgba(10,20,70,.25),transparent)"></div>

<!-- Loading -->
<div id="loading">
  <div id="fsc" style="position:absolute;inset:0;overflow:hidden;pointer-events:none;"></div>
  <div class="orb"></div>
  <p id="lmsg" style="font-size:.88rem;letter-spacing:.12em;color:rgba(201,168,76,.8);min-height:1.4em;text-align:center;">カードを読み解いています...</p>
  <p style="font-size:.65rem;color:rgba(201,168,76,.3);letter-spacing:.12em;">30〜60秒かかります</p>
</div>

<div class="wrap">
  <header class="hdr">
    <p class="sub-lbl">☽ Tarot Love Reading ☾</p>
    <h1 class="title">神楽タロット</h1>
  </header>

  <!-- Steps -->
  <div class="steps">
    <div class="step-dot active" id="dot0"></div>
    <div class="step-dot" id="dot1"></div>
    <div class="step-dot" id="dot2"></div>
    <div class="step-dot" id="dot3"></div>
  </div>

  <form action="/tarot/reading" method="POST" id="tarot-form">
    <input type="hidden" name="card_id"      id="card_id_input"    value="0">
    <input type="hidden" name="is_upright"   id="is_upright_input" value="true">
    <input type="hidden" name="user_problem" id="problem_input"    value="">
    <input type="hidden" name="email"        id="email_input"      value="">

    <!-- Step 1: Problem -->
    <div class="section visible" id="step0">
      <p class="sec-title">― Step 1 ―　あなたの悩みは？</p>
      <div class="prob-grid">
        <button type="button" class="prob-btn" data-v="片思い"       onclick="selectProb(this)"><span class="emoji">💌</span>片思い</button>
        <button type="button" class="prob-btn" data-v="復縁"         onclick="selectProb(this)"><span class="emoji">🕯️</span>復縁</button>
        <button type="button" class="prob-btn" data-v="浮気・秘密の恋" onclick="selectProb(this)"><span class="emoji">🌙</span>秘密の恋</button>
        <button type="button" class="prob-btn" data-v="相手の本音"   onclick="selectProb(this)"><span class="emoji">🔍</span>相手の本音</button>
      </div>
      <button type="button" class="nav-btn" id="next0" onclick="goStep(1)" disabled>カードを選ぶ →</button>
    </div>

    <!-- Step 2: Card selection -->
    <div class="section" id="step1">
      <p class="sec-title">― Step 2 ―　1枚引いてください</p>
      <div class="card-grid" id="card-grid"></div>
      <button type="button" class="nav-btn" id="next1" onclick="goStep(2)" disabled style="margin-top:14px;">向きを選ぶ →</button>
    </div>

    <!-- Step 3: Orientation -->
    <div class="section" id="step2">
      <p class="sec-title">― Step 3 ―　カードの向きは？</p>
      <div id="card-prev-wrap"></div>
      <div class="orient-row">
        <button type="button" class="orient-btn sel" id="ob-up"   onclick="selectOrient(true)">正位置 ↑</button>
        <button type="button" class="orient-btn"     id="ob-down" onclick="selectOrient(false)">逆位置 ↓</button>
      </div>
      <button type="button" class="nav-btn" onclick="goStep(3)">メールを入力 →</button>
    </div>

    <!-- Step 4: Email + Submit -->
    <div class="section" id="step3">
      <p class="sec-title">― Step 4 ―　鑑定結果を受け取る</p>
      <div style="margin-bottom:18px;">
        <p style="font-size:.7rem;color:var(--gold);letter-spacing:.15em;margin-bottom:8px;">メールアドレス（有料鑑定の受け取りに使用）</p>
        <input type="text" class="field-input" placeholder="example@gmail.com" oninput="document.getElementById('email_input').value=this.value">
      </div>
      <button type="submit" class="cta" id="submit-btn">🔮 &nbsp;今すぐ無料で鑑定する&nbsp; →</button>
      <p class="note">完全無料・カード不要<br>有料部分（¥500）はこの後に表示されます</p>
    </div>
  </form>
</div>

<script>
const CARDS = {{ cards_json | safe }};
let selectedCardId = null;
let selectedUpright = true;

// ── Starfield ──
const sf = document.getElementById('sf');
for(let i=0;i<130;i++){
  const s=document.createElement('div'); s.className='st';
  const sz=Math.random()*2+.4;
  s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;--d:${(Math.random()*4+2).toFixed(1)}s;--dl:${(Math.random()*6).toFixed(1)}s;`;
  sf.appendChild(s);
}

// ── Build card grid ──
const grid = document.getElementById('card-grid');
CARDS.forEach(card => {
  const el = document.createElement('div');
  el.className = 'card-item';
  el.dataset.id = card.id;
  el.innerHTML = `<img src="${card.image_url}" alt="${card.name}" loading="lazy"><div class="card-name">${card.name}</div>`;
  el.onclick = () => selectCard(card.id);
  grid.appendChild(el);
});

function selectCard(id){
  document.querySelectorAll('.card-item').forEach(c=>c.classList.remove('sel'));
  document.querySelector(`.card-item[data-id="${id}"]`).classList.add('sel');
  selectedCardId = id;
  document.getElementById('card_id_input').value = id;
  document.getElementById('next1').disabled = false;
}

function selectProb(btn){
  document.querySelectorAll('.prob-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  document.getElementById('problem_input').value = btn.dataset.v;
  document.getElementById('next0').disabled = false;
}

function selectOrient(upright){
  selectedUpright = upright;
  document.getElementById('is_upright_input').value = upright ? 'true' : 'false';
  document.getElementById('ob-up').classList.toggle('sel', upright);
  document.getElementById('ob-down').classList.toggle('sel', !upright);
}

function goStep(n){
  for(let i=0;i<4;i++){
    document.getElementById('step'+i).classList.toggle('visible', i===n);
    document.getElementById('dot'+i).classList.toggle('active', i===n);
  }
  // Update card preview in step3
  if(n===2 && selectedCardId!==null){
    const card = CARDS[selectedCardId];
    document.getElementById('card-prev-wrap').innerHTML = `
      <div class="card-preview">
        <img src="${card.image_url}" alt="${card.name}">
        <div class="card-preview-info">
          <div class="card-preview-name">${card.name}</div>
          <div class="card-preview-en">${card.name_en}</div>
        </div>
      </div>`;
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── Loading ──
const msgs=['カードのエネルギーを読み取っています...','あなたの悩みと照合しています...','あの人の本音を探っています...','鑑定文を紡いでいます...'];
let mi=0;
function typeMsg(text,el,cb){
  el.textContent=''; let i=0;
  const t=setInterval(()=>{
    el.textContent+=text[i++];
    if(i>=text.length){clearInterval(t);if(cb)setTimeout(cb,1600);}
  },55);
}
function cycleMsgs(){
  typeMsg(msgs[mi%msgs.length],document.getElementById('lmsg'),cycleMsgs);
  mi++;
}
function spawnFS(){
  const c=document.getElementById('fsc');
  for(let i=0;i<50;i++){
    const fs=document.createElement('div'); fs.className='fs';
    const h=Math.random()*60+30;
    fs.style.cssText=`left:${Math.random()*100}%;top:${-h}px;height:${h}px;--fd:${(Math.random()*4+3).toFixed(1)}s;--fdl:${(Math.random()*6).toFixed(1)}s;`;
    c.appendChild(fs);
  }
}
document.getElementById('tarot-form').addEventListener('submit',()=>{
  document.getElementById('loading').classList.add('on');
  spawnFS(); cycleMsgs();
});
</script>
</body>
</html>
