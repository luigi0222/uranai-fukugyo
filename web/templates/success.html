<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お申込み完了｜星詠み</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Hiragino Mincho ProN", "Yu Mincho", Georgia, serif;
      background: #0d0020;
      background-image:
        radial-gradient(ellipse at 50% 30%, rgba(120,40,255,0.18) 0%, transparent 60%);
      color: #f0e4ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      max-width: 560px;
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(180,120,255,0.25);
      border-radius: 20px;
      padding: 60px 50px;
      text-align: center;
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .stars-anim {
      font-size: 2.4em;
      letter-spacing: 0.4em;
      color: #c9a84c;
      animation: pulse 2.4s ease-in-out infinite;
      margin-bottom: 24px;
      display: block;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.45; }
    }

    h1 {
      font-size: 1.5em;
      font-weight: normal;
      color: #c9a84c;
      letter-spacing: 0.12em;
      margin-bottom: 24px;
    }

    .message {
      color: #b090d0;
      font-size: 0.97em;
      line-height: 2.2;
      margin-bottom: 36px;
    }

    .info-box {
      background: rgba(201,168,76,0.07);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 12px;
      padding: 22px 24px;
      color: #e8d4aa;
      font-size: 0.9em;
      line-height: 2.1;
      margin-bottom: 36px;
      text-align: left;
    }
    .info-box strong { color: #c9a84c; }

    .back-btn {
      display: inline-block;
      color: #b090d0;
      font-size: 0.88em;
      text-decoration: none;
      border: 1px solid rgba(180,120,255,0.3);
      border-radius: 8px;
      padding: 10px 22px;
      transition: border-color 0.2s;
    }
    .back-btn:hover { border-color: #c9a84c; color: #c9a84c; }

    .progress-wrap {
      margin: 28px 0;
    }
    .progress-bar-bg {
      background: rgba(255,255,255,0.08);
      border-radius: 6px;
      height: 6px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #7c3aed, #c9a84c);
      border-radius: 6px;
      animation: progressAnim 28s linear forwards;
    }
    @keyframes progressAnim {
      0%   { width: 0%; }
      80%  { width: 88%; }
      100% { width: 92%; }
    }
    .progress-label {
      color: #9070b0;
      font-size: 0.82em;
      margin-top: 8px;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="stars-anim">✦ ✦ ✦</span>

    <h1>お申込みありがとうございます</h1>

    <p class="message">
      決済が完了しました。<br>
      ただいま、あなただけの鑑定書を<br>
      星とタロットから丁寧に紡いでいます。
    </p>

    <div class="progress-wrap">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill"></div>
      </div>
      <p class="progress-label">鑑定書生成中...</p>
    </div>

    <div class="info-box">
      <strong>📩 納品について</strong><br>
      ご登録のメールアドレスに<br>
      <strong>30分以内</strong>に鑑定書をお送りします。<br><br>
      <strong>⚠ 届かない場合</strong><br>
      迷惑メールフォルダをご確認のうえ、<br>
      SNS の DM までご連絡ください。
    </div>

    <a href="/" class="back-btn">← トップページへ戻る</a>
  </div>
</body>
</html>
